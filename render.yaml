services:
  - type: web
    name: wedding-planner
    runtime: node
    repo: https://github.com/Davidjunior1/wedding-planner
    rootDir: wedding-planner
    buildCommand: npm install && npm run build
    startCommand: node server.cjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-planner-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: wedding-planner-db
    databaseName: wedding_planner
    plan: free
